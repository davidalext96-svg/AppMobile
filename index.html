<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14161B">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bitácora">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Bitácora — Aficiones</title>
<style>
:root{
  --accent-lit:#C6821E; --accent-esc:#6D5AE6; --accent-mma:#D2413A; --accent-bai:#159A8C; --accent-esp:#2F80B8; --accent-cine:#7C4DD1;
  --bg:#F5F3EE; --surface:#FFFFFF; --surface-2:#FBFAF7; --border:#E6E0D5;
  --text:#221F1A; --text-dim:#6B665C; --text-faint:#9C978C;
  --header-bg:rgba(255,255,255,.88);
  --shadow:0 1px 2px rgba(40,30,10,.06), 0 8px 24px rgba(40,30,10,.06);
  --radius:16px; --radius-sm:11px;
  --font-display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --font-body:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Roboto Mono",Menlo,Consolas,monospace;
}
[data-theme="azul"]{
  --bg:#0E1A2B; --surface:#16273D; --surface-2:#1D3049; --border:#2B4568;
  --text:#EAF1FA; --text-dim:#9FB4CE; --text-faint:#5F779A;
  --header-bg:rgba(22,39,61,.9);
  --shadow:0 1px 2px rgba(0,0,0,.35), 0 10px 26px rgba(0,0,0,.35);
}
[data-theme="oscuro"]{
  --bg:#121419; --surface:#1C1F26; --surface-2:#22262F; --border:#2D323C;
  --text:#ECEAE3; --text-dim:#A6AAB3; --text-faint:#6E727C;
  --header-bg:rgba(28,31,38,.9);
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 10px 28px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text); font-family:var(--font-body);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---------- LOGIN ---------- */
#lock{
  position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:32px;background:var(--bg);
  text-align:center;
}
#lock .mark{
  width:76px;height:76px;border-radius:22px;display:grid;place-items:center;margin-bottom:22px;
  background:linear-gradient(150deg,var(--accent-lit),var(--accent-mma) 55%,var(--accent-esc));
  box-shadow:var(--shadow);
}
#lock .mark svg{width:40px;height:40px;color:#fff}
#lock h1{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:.2px}
#lock .sub{color:var(--text-dim);margin:6px 0 30px;font-size:14px;max-width:290px}
.pinbox{display:flex;gap:12px;margin-bottom:18px}
.pindot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--text-faint);transition:.15s}
.pindot.on{background:var(--text);border-color:var(--text);transform:scale(1.05)}
.pad{display:grid;grid-template-columns:repeat(3,72px);gap:14px;margin-top:6px}
.key{
  height:64px;border-radius:50%;font-size:24px;font-weight:500;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--shadow);transition:.1s;color:var(--text);
}
.key:active{transform:scale(.93);background:var(--surface-2)}
.key.wide{font-size:14px;letter-spacing:.5px;color:var(--text-dim);box-shadow:none;background:transparent;border-color:transparent}
.lock-note{margin-top:26px;font-size:12px;color:var(--text-faint);max-width:300px}
.lock-err{color:var(--accent-mma);font-size:13px;min-height:18px;margin-top:2px}
.setup-field{width:min(320px,80vw);margin:0 auto 14px;text-align:left}
.setup-field label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.3px}
.setup-field input{
  width:100%;padding:13px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface);color:var(--text);
}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100%;padding-bottom:78px}
#app.show{display:block}
.appbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;
  padding:12px 16px calc(12px);padding-top:max(12px,env(safe-area-inset-top));
  background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.appbar .logo{
  width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none;
  background:linear-gradient(150deg,var(--accent-lit),var(--accent-mma) 55%,var(--accent-esc));
}
.appbar .logo svg{width:19px;height:19px;color:#fff}
.appbar .title{font-family:var(--font-display);font-size:19px;font-weight:600;flex:1;letter-spacing:.2px}
.appbar .title small{display:block;font-family:var(--font-body);font-size:11px;color:var(--text-dim);font-weight:400;letter-spacing:.6px;text-transform:uppercase}
.icobtn{
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
  color:var(--text-dim);border:1px solid transparent;transition:.12s;
}
.icobtn:active{background:var(--surface-2)}
.icobtn svg{width:20px;height:20px}

/* theme popover */
.pop{position:absolute;top:58px;right:12px;z-index:50;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:7px;min-width:210px;display:none}
.pop.show{display:block}
.pop h4{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-faint);padding:8px 10px 4px}
.pop button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 10px;border-radius:10px;text-align:left;font-size:14px}
.pop button:active{background:var(--surface-2)}
.pop button.active{background:var(--surface-2);font-weight:600}
.pop .sw{width:22px;height:22px;border-radius:7px;border:1px solid var(--border);flex:none}
.pop hr{border:none;border-top:1px solid var(--border);margin:6px 4px}
.pop .mi{width:19px;height:19px;color:var(--text-dim)}

/* ---------- MAIN ---------- */
.main{padding:18px 15px 8px;max-width:640px;margin:0 auto}
.view{display:none}
.view.show{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.eyebrow{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);font-weight:700}
.h-view{font-family:var(--font-display);font-size:26px;font-weight:600;margin:2px 0 3px;letter-spacing:.2px}
.view-lead{color:var(--text-dim);font-size:13.5px;margin-bottom:18px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card.pad0{padding:0;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-h .lbl{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15px}
.dot{width:9px;height:9px;border-radius:50%;flex:none}

/* KPI grid */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow)}
.kpi .n{font-family:var(--font-mono);font-size:26px;font-weight:600;line-height:1;letter-spacing:-.5px}
.kpi .k{font-size:11.5px;color:var(--text-dim);margin-top:6px;letter-spacing:.3px}
.kpi .sub{font-size:11px;color:var(--text-faint);margin-top:2px}

/* donut / balance */
.balance{display:flex;align-items:center;gap:18px}
.balance svg{flex:none}
.legend{flex:1;display:flex;flex-direction:column;gap:9px}
.legrow{display:flex;align-items:center;gap:9px;font-size:13px}
.legrow .lk{flex:1;color:var(--text-dim)}
.legrow .lv{font-family:var(--font-mono);font-weight:600}

/* bars */
.bars{display:flex;align-items:flex-end;gap:7px;height:120px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:26px;border-radius:6px 6px 3px 3px;background:var(--accent-esc);min-height:3px;transition:height .4s}
.bar-x{font-size:10px;color:var(--text-faint);font-family:var(--font-mono)}
.bar-v{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);font-weight:600}

/* form */
.field{margin-bottom:12px}
.field label{font-size:12px;color:var(--text-dim);font-weight:600;letter-spacing:.3px;display:block;margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:11px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface-2);color:var(--text);transition:.12s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--fc,var(--accent-esc));background:var(--surface)}
.field textarea{resize:vertical;min-height:90px;line-height:1.55}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;
  padding:12px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14.5px;
  background:var(--accent-esc);color:#fff;transition:.12s;box-shadow:var(--shadow);
}
.btn:active{transform:translateY(1px);filter:brightness(.96)}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border);box-shadow:none}
.btn svg{width:17px;height:17px}
.btn-sm{width:auto;padding:8px 13px;font-size:13px}

/* list items */
.item{display:flex;gap:12px;padding:13px 15px;border-bottom:1px solid var(--border);align-items:flex-start}
.item:last-child{border-bottom:none}
.item .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none;color:#fff}
.item .ico svg{width:17px;height:17px}
.item .body{flex:1;min-width:0}
.item .t1{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px}
.item .t2{font-size:12.5px;color:var(--text-dim);margin-top:2px;word-break:break-word}
.item .t3{font-size:11.5px;color:var(--text-faint);margin-top:4px;font-family:var(--font-mono);display:flex;gap:10px;flex-wrap:wrap}
.item .del{color:var(--text-faint);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none}
.item .del:active{background:var(--surface-2);color:var(--accent-mma)}
.item .del svg{width:16px;height:16px}

.chip{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.tag{font-size:11px;padding:3px 10px;border-radius:8px;border:1px solid var(--border);color:var(--text-dim);background:var(--surface-2);cursor:pointer;font-weight:500}
.tag.on{color:#fff;border-color:transparent}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}

.empty{text-align:center;padding:34px 20px;color:var(--text-faint)}
.empty svg{width:34px;height:34px;margin-bottom:10px;opacity:.6}
.empty p{font-size:13.5px}

.progress{height:7px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:8px;border:1px solid var(--border)}
.progress i{display:block;height:100%;border-radius:6px;background:var(--accent-lit)}

/* results table */
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
th{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--text-faint);font-weight:700;background:var(--surface-2);position:sticky;top:0}
td.desc{white-space:normal;min-width:180px;color:var(--text-dim)}
tbody tr:active{background:var(--surface-2)}
.num{font-family:var(--font-mono);text-align:right}

/* bottom nav */
.bottomnav{
  position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;
  background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);
}
.nav-i{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 1px 7px;color:var(--text-faint);transition:.12s;position:relative}
.nav-i svg{width:21px;height:21px}
.nav-i span{font-size:9.5px;font-weight:600;letter-spacing:.1px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-i.active{color:var(--nav-c,var(--text))}
.nav-i.active::before{content:"";position:absolute;top:0;width:26px;height:3px;border-radius:0 0 4px 4px;background:currentColor}

/* toast */
#toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:var(--text);color:var(--bg);padding:11px 18px;border-radius:30px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;max-width:88vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--surface);width:100%;max-width:560px;border-radius:20px 20px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom));
  max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.modal h3{font-family:var(--font-display);font-size:21px;font-weight:600;margin-bottom:4px}
.modal .msub{color:var(--text-dim);font-size:13px;margin-bottom:16px}
.grabber{width:38px;height:4px;border-radius:3px;background:var(--border);margin:0 auto 14px}
@media(min-width:560px){.modal{border-radius:20px;margin-bottom:auto;margin-top:auto}.modal-bg{align-items:center}}

/* nudge / recordatorio */
.nudge{position:relative;display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent-esc);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 40px 14px 15px;margin-bottom:16px;animation:fade .3s ease}
.nudge .ni{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--accent-esc);color:#fff;flex:none}
.nudge .ni svg{width:17px;height:17px}
.nudge .nx{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:var(--text-faint);font-size:19px;line-height:1}
.nudge .nx:active{background:var(--surface-2)}
/* metas */
.goal{margin-bottom:13px}
.goal:last-child{margin-bottom:2px}
.goal-top{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-bottom:6px}
.goal-top .gv{margin-left:auto;font-family:var(--font-mono);color:var(--text-dim);font-size:12px}
.goal-top .done{color:var(--accent-bai);font-weight:700}
.goal-set{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.goal-set select,.goal-set input{padding:8px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);width:auto}
.goal-set .gnum{width:66px;text-align:center}
.rowline{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.rowline .lx{flex:1;font-size:13.5px}
.rowline .lx small{display:block;color:var(--text-faint);font-size:11.5px;margin-top:2px}
/* switch */
.switch{position:relative;display:inline-block;width:44px;height:26px;flex:none}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--border);border-radius:20px;transition:.2s;cursor:pointer}
.switch .sl:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.switch input:checked + .sl{background:var(--accent-esc)}
.switch input:checked + .sl:before{transform:translateX(18px)}
/* calendario / agenda */
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cal-title{font-family:var(--font-display);font-size:20px;font-weight:600;flex:1;text-transform:capitalize;letter-spacing:.2px}
.cal-nav{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim)}
.cal-nav:active{background:var(--border)}
.cal-nav svg{width:19px;height:19px}
.today-btn{padding:8px 13px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);font-size:12.5px;font-weight:600;color:var(--text-dim)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--text-faint);letter-spacing:.5px;padding:2px 0 6px}
.cal-cell{aspect-ratio:1/1;border-radius:11px;display:flex;flex-direction:column;align-items:center;padding:6px 2px 4px;position:relative;cursor:pointer;border:1.5px solid transparent;transition:.1s}
.cal-cell:active{background:var(--surface-2)}
.cal-cell .dn{font-size:13px;font-weight:600;font-family:var(--font-mono)}
.cal-cell.mute{cursor:pointer}
.cal-cell.mute .dn{color:var(--text-faint);opacity:.55}
.cal-cell.today{border-color:var(--accent-esc)}
.cal-cell.today .dn{color:var(--accent-esc)}
.cal-cell.sel{background:var(--accent-esc)}
.cal-cell.sel .dn{color:#fff}
.cal-cell.sel:active{filter:brightness(.94)}
.cal-dots{display:flex;gap:3px;margin-top:auto;min-height:6px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:100%}
.cal-dot{width:5px;height:5px;border-radius:50%;flex:none}
.cal-cell.sel .cal-dot{box-shadow:0 0 0 1px rgba(255,255,255,.6)}
/* detalle */
.dl .dr{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.dl .dr:last-child{border-bottom:none}
.dl .dr .k{color:var(--text-dim)}
.dl .dr .v{font-weight:600;text-align:right}
.detail-block{white-space:pre-wrap;font-size:14px;line-height:1.65;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px;max-height:42vh;overflow:auto}
/* tipografías (offline, fuentes de sistema) */
body[data-font="clasica"]{--font-display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;--font-body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace}
body[data-font="moderna"]{--font-display:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--font-body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,Menlo,Consolas,monospace}
body[data-font="editorial"]{--font-display:Georgia,"Times New Roman","Noto Serif",serif;--font-body:Georgia,"Times New Roman","Noto Serif",serif;--font-mono:ui-monospace,Menlo,Consolas,monospace}
body[data-font="redondeada"]{--font-display:"Trebuchet MS","Segoe UI",Verdana,"Noto Sans",sans-serif;--font-body:"Trebuchet MS","Segoe UI",Verdana,"Noto Sans",sans-serif;--font-mono:ui-monospace,Menlo,Consolas,monospace}
body[data-font="tecnica"]{--font-display:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Roboto Mono",monospace;--font-body:ui-monospace,"SFMono-Regular",Menlo,Consolas,"Roboto Mono",monospace;--font-mono:ui-monospace,Menlo,Consolas,monospace}
body[data-font="elegante"]{--font-display:"Baskerville","Hoefler Text","Big Caslon",Garamond,Georgia,serif;--font-body:"Palatino Linotype",Palatino,Georgia,serif;--font-mono:ui-monospace,Menlo,Consolas,monospace}
/* filas de ajustes */
.setrow{display:flex;align-items:center;gap:13px;width:100%;padding:15px 4px;border-bottom:1px solid var(--border);text-align:left;color:var(--text)}
.setrow:last-of-type{border-bottom:none}
.setrow:active{background:var(--surface-2)}
.setrow .si{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;background:var(--surface-2);color:var(--text-dim)}
.setrow .si svg{width:19px;height:19px}
.setrow .sc{flex:1;min-width:0}

.addline button{flex:none;padding:0 16px;border-radius:var(--radius-sm);background:var(--accent-esc);color:#fff;font-weight:600}
.font-opt{display:flex;align-items:center;gap:12px;width:100%;padding:13px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);margin-bottom:9px;text-align:left;color:var(--text)}
.font-opt.on{border-color:var(--accent-esc);background:var(--surface)}
.font-opt .fname{flex:1;font-weight:600;font-size:14px}

/* segmentado */

.season .srow{display:flex;gap:8px;margin-bottom:8px}
.season .srow select,.season .srow input{padding:9px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.season textarea{width:100%;padding:9px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);min-height:60px;resize:vertical}

<script>
"use strict";
/* ============================================================
   Bitácora — app de aficiones (archivo único, offline)
   ============================================================ */

const DB_KEY='bitacora_db_v1', AUTH_KEY='bitacora_auth_v1';

/* ---- catálogo de aficiones ---- */
const HOBBIES={
  literatura:{label:'Literatura', short:'Literatura', color:'var(--accent-lit)', hex:'#C6821E', view:'lit',
    icon:'<path d="M4 5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v14l-4-2-4 2-4-2V5z"/>'},
  cine:{label:'Cine', short:'Cine', color:'var(--accent-cine)', hex:'#7C4DD1', view:'cine',
    icon:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 3v18M17 3v18M3 7.5h4M17 7.5h4M3 12h18M3 16.5h4M17 16.5h4"/>'},
  mma:{label:'MMA', short:'MMA', color:'var(--accent-mma)', hex:'#D2413A', view:'mma',
    icon:'<path d="M6 12a6 6 0 0 1 6-6 6 6 0 0 1 6 6"/><path d="M6 12v3a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3v-3"/><path d="M9 12V9M12 12V8M15 12V9"/>'},
  baile:{label:'Baile', short:'Baile', color:'var(--accent-bai)', hex:'#159A8C', view:'bai',
    icon:'<circle cx="12" cy="5" r="2"/><path d="M12 7v5l3 5M12 12l-3 5M9 9l6 0"/>'},
  espiritual:{label:'Espiritual', short:'Espiritual', color:'var(--accent-esp)', hex:'#2F80B8', view:'espir',
    icon:'<path d="M19 17V5a2 2 0 0 0-2-2H4"/><path d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"/>'}
};
const ESC_ICON='<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>';
const MMA_TIPOS=['Técnica','Sparring','Físico','Grappling','Cardio','Otro'];
const BAILE_ESTILOS=['Bachata','Salsa','Merengue','Kizomba','Otro'];
const ESC_TIPOS=['Diario','Sueño','Anécdota','Novela'];
const LIB_ESTADOS=['Por leer','Leyendo','Terminado','Abandonado'];
const DEFAULT_METAS={literatura:{tipo:'tiempo',valor:180},cine:{tipo:'sesiones',valor:0},mma:{tipo:'sesiones',valor:3},baile:{tipo:'tiempo',valor:120},espiritual:{tipo:'sesiones',valor:1}};
const DEFAULT_REC={activo:true,dias:[0,1,2,3,4],hora:'19:00',notificar:false,parasha:{activo:true,dia:4}};
const DEFAULT_CONFIG={escTipos:[...ESC_TIPOS],mmaTipos:[...MMA_TIPOS],baileEstilos:[...BAILE_ESTILOS],libroCampos:[]};

/* ---- estado ---- */
let DB, AUTH, pinBuf='', route='panel', filterHobby='todos', escFilter='todos', nudgeDismissed=false;
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSelected=null, deferredInstall=null;
let litTab='lectura', cineTab='peliculas';

/* ---- persistencia ---- */
function nid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function loadDB(){
  try{const r=localStorage.getItem(DB_KEY);if(r)return JSON.parse(r)}catch(e){}
  return {meta:{version:4,creado:new Date().toISOString()},ui:{tema:'claro',fuente:'clasica'},libros:[],escritos:[],registros:[],parashot:[],librosEsp:[],peliculas:[],series:[],
    metas:JSON.parse(JSON.stringify(DEFAULT_METAS)),recordatorios:JSON.parse(JSON.stringify(DEFAULT_REC)),config:JSON.parse(JSON.stringify(DEFAULT_CONFIG))};
}
function ensureSchema(){
  if(!DB.ui)DB.ui={tema:'claro',fuente:'clasica'};
  if(!DB.ui.fuente)DB.ui.fuente='clasica';
  if(DB.ui.tema==='gris')DB.ui.tema='azul';
  ['libros','escritos','registros','parashot','librosEsp','peliculas','series'].forEach(k=>{if(!Array.isArray(DB[k]))DB[k]=[]});
  if(!DB.metas)DB.metas=JSON.parse(JSON.stringify(DEFAULT_METAS));
  Object.keys(HOBBIES).forEach(k=>{if(!DB.metas[k])DB.metas[k]=(DEFAULT_METAS[k]?JSON.parse(JSON.stringify(DEFAULT_METAS[k])):{tipo:'tiempo',valor:0})});
  if(!DB.recordatorios)DB.recordatorios=JSON.parse(JSON.stringify(DEFAULT_REC));
  if(!Array.isArray(DB.recordatorios.dias))DB.recordatorios.dias=[0,1,2,3,4];
  if(!DB.recordatorios.parasha)DB.recordatorios.parasha={activo:true,dia:4};
  if(!DB.config)DB.config=JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  ['escTipos','mmaTipos','baileEstilos'].forEach(k=>{if(!Array.isArray(DB.config[k]))DB.config[k]=[...DEFAULT_CONFIG[k]]});
  if(!Array.isArray(DB.config.libroCampos))DB.config.libroCampos=[];
}
function saveDB(){try{localStorage.setItem(DB_KEY,JSON.stringify(DB))}catch(e){toast('No se pudo guardar')}}
function loadAuth(){try{const r=localStorage.getItem(AUTH_KEY);if(r)return JSON.parse(r)}catch(e){}return null}
function saveAuth(){localStorage.setItem(AUTH_KEY,JSON.stringify(AUTH))}

/* ---- utilidades ---- */
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function todayISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');const mm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return d+' '+(mm[+m-1]||'')+' '+y}
function fmtDur(min){min=Math.round(min||0);if(min<60)return min+' min';const h=Math.floor(min/60),m=min%60;return m?h+'h '+m+'m':h+'h'}
function words(t){t=(t||'').trim();return t?t.split(/\s+/).length:0}
function svgIco(path,w=20){return '<svg viewBox="0 0 24 24" width="'+w+'" height="'+w+'" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg>'}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

/* actividades unificadas para panel y tabla */
function allActivities(){
  const out=DB.registros.map(r=>({id:r.id,hobby:r.hobby,fecha:r.fecha,dur:r.duracionMin||0,desc:r.descripcion||'',cat:catOf(r),src:'reg'}));
  DB.escritos.forEach(e=>out.push({id:e.id,hobby:'literatura',fecha:e.fecha,dur:e.duracionMin||0,
    desc:(e.titulo||'(sin título)'),cat:e.tipo||'Escrito',src:'esc',palabras:words(e.contenido)}));
  DB.parashot.forEach(p=>out.push({id:p.id,hobby:'espiritual',fecha:p.fecha,dur:p.duracionMin||0,
    desc:p.nombre||'Parashá',cat:'Parashá',src:'par'}));
  DB.librosEsp.forEach(l=>out.push({id:l.id,hobby:'espiritual',fecha:l.fecha,dur:l.duracionMin||0,
    desc:l.titulo||'Libro',cat:'Libro',src:'libe'}));
  DB.peliculas.forEach(p=>out.push({id:p.id,hobby:'cine',fecha:p.fecha,dur:p.duracionMin||0,
    desc:p.nombre||'Película',cat:'Película',src:'peli'}));
  DB.series.forEach(s=>out.push({id:s.id,hobby:'cine',fecha:s.fecha,dur:0,
    desc:s.nombre||'Serie',cat:'Serie',src:'serie'}));
  return out.sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')||b.id.localeCompare(a.id));
}
function catOf(r){
  if(r.hobby==='mma')return r.meta&&r.meta.tipo||'Entreno';
  if(r.hobby==='baile')return r.meta&&r.meta.estilo||'Práctica';
  if(r.hobby==='literatura')return 'Lectura';
  return '';
}

/* ============================================================
   LOGIN
   ============================================================ */
function initLock(){
  AUTH=loadAuth();
  const setup=$('#setupWrap'), pinw=$('#pinWrap');
  if(!AUTH){
    $('#lockTitle').textContent='Bienvenido';
    $('#lockSub').textContent='Crea tu bitácora personal en un minuto';
    setup.style.display='block'; pinw.style.display='none';
    $('#setupName').focus();
  }else{
    $('#lockTitle').textContent='Hola'+(AUTH.nombre?', '+AUTH.nombre.split(' ')[0]:'');
    $('#lockSub').textContent='Introduce tu PIN para continuar';
    setup.style.display='none'; pinw.style.display='block';
    buildPad(); renderPinDots();
  }
}
function doSetup(){
  const name=$('#setupName').value.trim(), p1=$('#setupPin').value, p2=$('#setupPin2').value, err=$('#setupErr');
  if(!name){err.textContent='Escribe tu nombre';return}
  if(!/^\d{4}$/.test(p1)){err.textContent='El PIN debe tener 4 dígitos';return}
  if(p1!==p2){err.textContent='Los PIN no coinciden';return}
  AUTH={nombre:name,pin:p1}; saveAuth(); enterApp();
}
function buildPad(){
  const pad=$('#pad'); pad.innerHTML='';
  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  keys.forEach(k=>{
    const b=document.createElement('button');
    if(k===''){b.style.visibility='hidden';b.className='key';}
    else if(k==='⌫'){b.className='key wide';b.textContent='Borrar';b.onclick=()=>{pinBuf=pinBuf.slice(0,-1);renderPinDots()};}
    else{b.className='key';b.textContent=k;b.onclick=()=>pressPin(k);}
    pad.appendChild(b);
  });
}
function pressPin(d){if(pinBuf.length>=4)return;pinBuf+=d;renderPinDots();if(pinBuf.length===4)setTimeout(checkPin,120)}
function renderPinDots(){const box=$('#pinbox');box.innerHTML='';for(let i=0;i<4;i++){const s=document.createElement('span');s.className='pindot'+(i<pinBuf.length?' on':'');box.appendChild(s)}}
function checkPin(){
  if(pinBuf===AUTH.pin){pinBuf='';$('#pinErr').textContent='';enterApp();}
  else{$('#pinErr').textContent='PIN incorrecto';pinBuf='';renderPinDots();const b=$('#pinbox');b.style.animation='none';void b.offsetWidth;b.style.animation='shake .3s'}
}
function lockApp(){pinBuf='';$('#app').classList.remove('show');$('#lock').style.display='flex';initLock()}

/* ============================================================
   ARRANQUE APP
   ============================================================ */
function enterApp(){
  $('#lock').style.display='none';
  $('#app').classList.add('show');
  applyTheme(DB.ui.tema||'claro',true);
  applyFont(DB.ui.fuente||'clasica',true);
  $('#greet').textContent=AUTH&&AUTH.nombre?('Hola, '+AUTH.nombre.split(' ')[0]):'Aficiones';
  nudgeDismissed=false; scheduleNotif(); syncReminderToSW();
  buildNav(); go('panel');
}

/* ---- navegación ---- */
function buildNav(){
  const nav=$('#nav'); nav.innerHTML='';
  const items=[
    {id:'panel',label:'Panel',color:'var(--text)',icon:'<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>'},
    {id:'lit',label:'Literatura',color:HOBBIES.literatura.color,icon:HOBBIES.literatura.icon},
    {id:'cine',label:'Cine',color:HOBBIES.cine.color,icon:HOBBIES.cine.icon},
    {id:'mma',label:'MMA',color:HOBBIES.mma.color,icon:HOBBIES.mma.icon},
    {id:'bai',label:'Baile',color:HOBBIES.baile.color,icon:HOBBIES.baile.icon},
    {id:'espir',label:'Espiritual',color:HOBBIES.espiritual.color,icon:HOBBIES.espiritual.icon}
  ];
  items.forEach(it=>{
    const b=document.createElement('button');
    b.className='nav-i'; b.dataset.route=it.id; b.style.setProperty('--nav-c',it.color);
    b.innerHTML=svgIco(it.icon,22)+'<span>'+it.label+'</span>';
    b.onclick=()=>go(it.id);
    nav.appendChild(b);
  });
}
function go(r){
  route=r;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
  const vid={panel:'v-panel',agenda:'v-agenda',lit:'v-lit',mma:'v-mma',bai:'v-bai',espir:'v-espir',cine:'v-cine',tabla:'v-tabla'}[r];
  $('#'+vid).classList.add('show');
  document.querySelectorAll('.nav-i').forEach(n=>n.classList.toggle('active',n.dataset.route===r));
  window.scrollTo(0,0);
  ({panel:renderPanel,agenda:renderAgenda,lit:renderLit,mma:renderMma,bai:renderBai,espir:renderEspir,cine:renderCine,tabla:renderTabla}[r])();
}
function renderCurrent(){({panel:renderPanel,agenda:renderAgenda,lit:renderLit,mma:renderMma,bai:renderBai,espir:renderEspir,cine:renderCine,tabla:renderTabla}[route]||renderPanel)()}

/* ============================================================
   TEMAS Y TIPOGRAFÍA
   ============================================================ */
function applyTheme(name,silent){
  document.body.dataset.theme=name;
  const meta={claro:'#F5F3EE',azul:'#0E1A2B',oscuro:'#121419'}[name]||'#F5F3EE';
  const mt=document.querySelector('meta[name=theme-color]');if(mt)mt.content=meta;
  DB.ui.tema=name; if(!silent)saveDB();
}
function applyFont(name,silent){
  document.body.dataset.font=name||'clasica';
  DB.ui.fuente=name||'clasica'; if(!silent)saveDB();
}
const FUENTES=[
  {id:'clasica',nombre:'Clásica',muestra:'Aa'},
  {id:'moderna',nombre:'Moderna',muestra:'Aa'},
  {id:'editorial',nombre:'Editorial',muestra:'Aa'},
  {id:'redondeada',nombre:'Redondeada',muestra:'Aa'},
  {id:'tecnica',nombre:'Técnica',muestra:'Aa'},
  {id:'elegante',nombre:'Elegante',muestra:'Aa'}
];

/* ============================================================
   GRÁFICOS (SVG puro, sin dependencias)
   ============================================================ */
function donut(segments,size=118){
  const total=segments.reduce((s,x)=>s+x.v,0);
  const r=size/2-11, cx=size/2, cy=size/2, C=2*Math.PI*r;
  let off=0, arcs='';
  if(total>0){
    segments.forEach(s=>{
      if(s.v<=0)return;
      const frac=s.v/total, len=frac*C;
      arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="11" '
        +'stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" stroke-linecap="butt" transform="rotate(-90 '+cx+' '+cy+')"/>';
      off+=len;
    });
  }else{
    arcs='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="11"/>';
  }
  const totH=Math.round(total/60*10)/10;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+arcs
    +'<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-family="var(--font-mono)" font-size="21" font-weight="700" fill="var(--text)">'+totH+'</text>'
    +'<text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" font-size="9.5" fill="var(--text-faint)" letter-spacing="1">HORAS</text></svg>';
}
function barsWeekly(){
  const now=new Date(), weeks=[];
  for(let i=7;i>=0;i--){
    const end=new Date(now);end.setDate(now.getDate()-i*7);
    const start=new Date(end);start.setDate(end.getDate()-6);
    weeks.push({start,end,min:0,lbl:String(start.getDate()).padStart(2,'0')+'/'+String(start.getMonth()+1).padStart(2,'0')});
  }
  const first=new Date(weeks[0].start);first.setHours(0,0,0,0);
  allActivities().forEach(a=>{
    if(!a.fecha)return;const d=new Date(a.fecha+'T00:00:00');if(d<first)return;
    const idx=Math.floor((d-first)/(7*864e5));if(idx>=0&&idx<8)weeks[idx].min+=a.dur;
  });
  const max=Math.max(60,...weeks.map(w=>w.min));
  let cols='';
  weeks.forEach(w=>{
    const h=Math.max(3,Math.round(w.min/max*100));
    const v=w.min>0?(Math.round(w.min/60*10)/10):'';
    cols+='<div class="bar-col"><span class="bar-v">'+v+'</span><div class="bar" style="height:'+h+'%"></div><span class="bar-x">'+w.lbl+'</span></div>';
  });
  return '<div class="bars">'+cols+'</div>';
}

/* ---- metas semanales y recordatorios ---- */
function weekStartISO(){
  const d=new Date();d.setHours(0,0,0,0);
  const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); // lunes
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parashaSemana(){
  const ws=weekStartISO();
  const we=new Date(ws+'T00:00:00');we.setDate(we.getDate()+6);
  const weISO=we.getFullYear()+'-'+String(we.getMonth()+1).padStart(2,'0')+'-'+String(we.getDate()).padStart(2,'0');
  return DB.parashot.find(p=>p.fecha&&p.fecha>=ws&&p.fecha<=weISO)||null;
}
function parashaReminderOn(){return !!(DB.recordatorios.parasha&&DB.recordatorios.parasha.activo)}
function weeklyProgress(){
  const ws=weekStartISO();
  const per={};Object.keys(HOBBIES).forEach(k=>per[k]={min:0,ses:0});
  allActivities().forEach(a=>{if(a.fecha&&a.fecha>=ws){per[a.hobby].min+=a.dur;per[a.hobby].ses+=1}});
  const out={};
  Object.keys(HOBBIES).forEach(k=>{
    const g=DB.metas[k]||{tipo:'tiempo',valor:0}, p=per[k];
    const cur=g.tipo==='sesiones'?p.ses:p.min;
    out[k]={min:p.min,ses:p.ses,activa:g.valor>0,cur,target:g.valor,unit:g.tipo==='sesiones'?'ses':'min',
      pct:g.valor?Math.min(100,Math.round(cur/g.valor*100)):0};
  });
  return out;
}
function nudgePending(wp){
  const pend=[];
  if(parashaReminderOn()&&!parashaSemana())pend.push('Espiritual: prepara la parashá de esta semana');
  Object.keys(HOBBIES).forEach(k=>{const g=wp[k];if(!g.activa||g.cur>=g.target)return;
    const falta=g.target-g.cur;
    pend.push(HOBBIES[k].label+': faltan '+(g.unit==='min'?fmtDur(falta):falta+(falta===1?' sesión':' sesiones')));});
  return pend;
}
function buildNudge(wp){
  if(nudgeDismissed)return '';
  if(!DB.recordatorios.activo&&!parashaReminderOn())return '';
  const hayMetas=Object.keys(HOBBIES).some(k=>wp[k].activa);
  if(!hayMetas&&!parashaReminderOn())return '';
  const bell='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>';
  const pend=nudgePending(wp);
  if(pend.length){
    return '<div class="nudge"><div class="ni">'+bell+'</div>'
      +'<div style="flex:1"><div style="font-weight:600;font-size:13.5px;margin-bottom:3px">Tus metas de esta semana</div>'
      +'<div style="font-size:12.5px;color:var(--text-dim);line-height:1.6">'+pend.slice(0,4).map(esc).join('<br>')+'</div></div>'
      +'<button class="nx" onclick="dismissNudge()">&times;</button></div>';
  }
  return '<div class="nudge" style="border-left-color:var(--accent-bai)"><div class="ni" style="background:var(--accent-bai)">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'
    +'<div style="flex:1"><div style="font-weight:600;font-size:13.5px;margin-bottom:2px">¡Metas cumplidas!</div>'
    +'<div style="font-size:12.5px;color:var(--text-dim)">Completaste todas tus metas de esta semana. Bien hecho.</div></div>'
    +'<button class="nx" onclick="dismissNudge()">&times;</button></div>';

function dismissNudge(){nudgeDismissed=true;renderPanel()}
function scheduleNotif(){
  if(!DB.recordatorios.notificar)return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const day=(new Date().getDay()+6)%7;
  const genOn=DB.recordatorios.activo&&(DB.recordatorios.dias||[]).includes(day);
  const parOn=parashaReminderOn()&&day===DB.recordatorios.parasha.dia;
  if(!genOn&&!parOn)return;
  const parts=(DB.recordatorios.hora||'19:00').split(':'),h=+parts[0],m=+parts[1];
  const now=new Date(), tgt=new Date();tgt.setHours(h,m,0,0);
  const ms=tgt-now;
  if(ms>0&&ms<86400000){clearTimeout(window._notifT);window._notifT=setTimeout(fireNotif,ms)}
}
function fireNotif(){
  try{
    const day=(new Date().getDay()+6)%7;
    let body;
    if(parashaReminderOn()&&day===DB.recordatorios.parasha.dia&&!parashaSemana()){
      body='Prepara la parashá de esta semana';
    }else{
      const pend=nudgePending(weeklyProgress());
      body=pend.length?pend[0]:'¿Registramos tu práctica de hoy?';
    }
    new Notification('Bitácora',{body:body});
  }catch(e){}
}

function computeStats(){
  const acts=allActivities();
  const per={literatura:0,escritura:0,mma:0,baile:0}, cnt={literatura:0,escritura:0,mma:0,baile:0};
  const days=new Set(); let totMin=0;
  acts.forEach(a=>{per[a.hobby]=(per[a.hobby]||0)+a.dur;cnt[a.hobby]=(cnt[a.hobby]||0)+1;totMin+=a.dur;if(a.fecha)days.add(a.fecha)});
  // racha
  let streak=0;const t=new Date();t.setHours(0,0,0,0);
  for(let i=0;i<3650;i++){const d=new Date(t);d.setDate(t.getDate()-i);
    const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(days.has(iso))streak++;else if(i>0)break;else continue;}
  return {acts,per,cnt,days:days.size,totMin,totSes:acts.length,streak};
}

        +'<div class="progress"><i style="width:'+Math.round(porTipo[t]/maxv*100)+'%;background:'+h.hex+'"></i></div></div>').join('')+'</div>';
  }

  if(regs.length){
    html+='<div class="eyebrow" style="margin:20px 0 10px">Historial</div>';
    html+='<div class="card pad0">'+regs.map(r=>activityRow({id:r.id,hobby:'mma',fecha:r.fecha,dur:r.duracionMin,desc:r.descripcion||'Entrenamiento',cat:(r.meta&&r.meta.tipo)+(r.meta&&r.meta.intensidad?' · Int '+r.meta.intensidad+'/5':''),src:'reg'},true)).join('')+'</div>';
  }else{
    html+=emptyState('Sin entrenamientos','Registra tu primera sesión de MMA.');
  }
  $('#v-mma').innerHTML=html;
}

  const obj={nombre:nom,director:$('#pl_dir').value.trim(),anio:+$('#pl_anio').value||'',fecha:$('#pl_fecha').value||todayISO(),
    calificacion:+$('#pl_cal').value||0,comentarios:$('#pl_com').value.trim(),duracionMin:+$('#pl_dur').value||0};
  if(id){const p=DB.peliculas.find(x=>x.id===id);Object.assign(p,obj)}
  else{obj.id=nid();DB.peliculas.push(obj)}
  saveDB();closeModal();renderCurrent();toast('Película guardada');
}
function seasonBlock(t){
  t=t||{num:'',calificacion:0,resena:''};
  return '<div class="season"><div class="season-h"><b style="flex:none">Temporada</b>'
    +'<input class="s-num" type="number" min="1" value="'+(t.num||'')+'" placeholder="#" style="width:62px">'
    +'<span style="flex:1"></span>'
    +'<select class="s-cal"><option value="0">— ★</option>'+[1,2,3,4,5].map(n=>'<option value="'+n+'"'+(t.calificacion===n?' selected':'')+'>'+'★'.repeat(n)+'</option>').join('')+'</select>'
    +'<button class="rm" onclick="this.closest(\'.season\').remove()">&times;</button></div>'
    +'<textarea class="s-res" placeholder="Reseña de la temporada...">'+esc(t.resena||'')+'</textarea></div>';
}
function modalSerie(id){
  const s=id?DB.series.find(x=>x.id===id):null;
  const temps=(s&&s.temporadas&&s.temporadas.length)?s.temporadas:[{num:1,calificacion:0,resena:''}];
  openModal('<h3>'+(s?'Editar serie':'Añadir serie')+'</h3><p class="msub">Calificación y reseña por temporada.</p>'
    +'<div class="row2"><div class="field"><label>Nombre</label><input id="se_nom" style="--fc:var(--accent-cine)" value="'+esc(s?s.nombre:'')+'" placeholder="Ej. Breaking Bad"></div>'
    +'<div class="field"><label>Fecha</label><input id="se_fecha" type="date" style="--fc:var(--accent-cine)" value="'+(s?s.fecha:todayISO())+'"></div></div>'
    +'<div class="eyebrow" style="margin:6px 0 10px">Temporadas</div>'
    +'<div id="seasonsWrap">'+temps.map(seasonBlock).join('')+'</div>'
    +'<button class="btn ghost btn-sm" style="width:auto;margin-bottom:14px" onclick="addSeason()">'+svgIco('<path d="M12 5v14M5 12h14"/>',15)+' Añadir temporada</button>'
    +'<button class="btn" style="background:var(--accent-cine)" onclick="saveSerie('+(s?"'"+s.id+"'":'null')+')">Guardar</button>'
    +(s?'<button class="btn ghost" style="margin-top:8px;color:var(--accent-mma)" onclick="delActivity(\'serie\',\''+s.id+'\',true)">Eliminar serie</button>':''));
}
function addSeason(){
  const wrap=document.getElementById('seasonsWrap');
  const next=wrap.querySelectorAll('.season').length+1;
  wrap.insertAdjacentHTML('beforeend',seasonBlock({num:next,calificacion:0,resena:''}));
}
function saveSerie(id){
  const nom=$('#se_nom').value.trim();if(!nom){toast('Escribe el nombre');return}
  const temporadas=[...document.querySelectorAll('#seasonsWrap .season')].map((el,i)=>({
    num:+el.querySelector('.s-num').value||(i+1),
    calificacion:+el.querySelector('.s-cal').value||0,
    resena:el.querySelector('.s-res').value.trim()
  }));
  const obj={nombre:nom,fecha:$('#se_fecha').value||todayISO(),temporadas:temporadas};
  if(id){const s=DB.series.find(x=>x.id===id);Object.assign(s,obj)}
  else{obj.id=nid();DB.series.push(obj)}
  saveDB();closeModal();renderCurrent();toast('Serie guardada');
}

function renderTabla(){
  let acts=allActivities();
  if(filterHobby!=='todos')acts=acts.filter(a=>a.hobby===filterHobby);

  let html='<div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">'
    +'<button class="icobtn" style="margin-left:-8px" onclick="go(\'panel\')">'+svgIco('<path d="M15 18l-6-6 6-6"/>',20)+'</button>'
    +'<div class="eyebrow">Registro completo</div></div>';
  html+='<div class="h-view">Tabla de resultados</div>'
    +'<p class="view-lead">Todas tus actividades en un solo lugar. Filtra y exporta a CSV.</p>';

  html+='<div class="filters">'
    +'<span class="tag'+(filterHobby==='todos'?' on':'')+'" style="'+(filterHobby==='todos'?'background:var(--text)':'')+'" onclick="setTablaFilter(\'todos\')">Todas</span>'
    +Object.keys(HOBBIES).map(k=>'<span class="tag'+(filterHobby===k?' on':'')+'" style="'+(filterHobby===k?'background:'+HOBBIES[k].hex:'')+'" onclick="setTablaFilter(\''+k+'\')">'+HOBBIES[k].label+'</span>').join('')
    +'</div>';

  const totMin=acts.reduce((a,x)=>a+x.dur,0);
  html+='<div class="kpis"><div class="kpi"><div class="n">'+acts.length+'</div><div class="k">Registros</div></div>'
    +'<div class="kpi"><div class="n">'+fmtDur(totMin)+'</div><div class="k">Tiempo acumulado</div></div></div>';

  if(acts.length){
    let rows=acts.map(a=>'<tr><td>'+fmtDate(a.fecha)+'</td>'
      +'<td><span class="chip" style="background:'+HOBBIES[a.hobby].hex+'22;color:'+HOBBIES[a.hobby].hex+'">'+HOBBIES[a.hobby].label+'</span></td>'
      +'<td>'+esc(a.cat||'')+'</td>'
      +'<td class="desc">'+esc(a.desc||'')+'</td>'
      +'<td class="num">'+(a.dur?fmtDur(a.dur):'—')+'</td></tr>').join('');
    html+='<div class="card pad0"><div class="tblwrap"><table><thead><tr><th>Fecha</th><th>Afición</th><th>Categoría</th><th>Descripción</th><th class="num">Duración</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
    html+='<button class="btn ghost" onclick="exportCSV()">'+svgIco('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>',17)+' Exportar CSV</button>';
  }else{
    html+=emptyState('Sin resultados','No hay actividades con este filtro.');
  }
  $('#v-tabla').innerHTML=html;
}
function setTablaFilter(k){filterHobby=k;renderTabla()}
function exportCSV(){
  let acts=allActivities();if(filterHobby!=='todos')acts=acts.filter(a=>a.hobby===filterHobby);
  const rows=[['Fecha','Aficion','Categoria','Descripcion','Duracion (min)']];
  acts.forEach(a=>rows.push([a.fecha,HOBBIES[a.hobby].label,a.cat||'',(a.desc||'').replace(/\s+/g,' '),a.dur||0]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  download('bitacora_resultados_'+todayISO()+'.csv','\ufeff'+csv,'text/csv');
  toast('CSV exportado');
}

/* ============================================================
   AGENDA (calendario)
   ============================================================ */
const DOW=['L','M','X','J','V','S','D'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
function isoOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDateLong(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return DIAS[d.getDay()]+', '+d.getDate()+' de '+MESES[d.getMonth()]+' '+d.getFullYear()}

function renderAgenda(){
  if(!calSelected)calSelected=todayISO();
  const byDay={};
  allActivities().forEach(a=>{if(a.fecha)(byDay[a.fecha]=byDay[a.fecha]||[]).push(a)});

  let html='<div class="eyebrow">Vista general</div>'
    +'<div class="h-view">Agenda</div><p class="view-lead">Tu mes de un vistazo. Toca un día para ver lo que hiciste.</p>';

  html+='<div class="cal-head">'
    +'<div class="cal-title">'+MESES[calMonth]+' '+calYear+'</div>'
    +'<button class="today-btn" onclick="goToday()">Hoy</button>'
    +'<button class="cal-nav" onclick="shiftMonth(-1)">'+svgIco('<path d="M15 18l-6-6 6-6"/>',19)+'</button>'
    +'<button class="cal-nav" onclick="shiftMonth(1)">'+svgIco('<path d="M9 18l6-6-6-6"/>',19)+'</button></div>';

  html+='<div class="card"><div class="cal-grid">'+DOW.map(d=>'<div class="cal-dow">'+d+'</div>').join('');
  const first=new Date(calYear,calMonth,1);
  const offset=(first.getDay()+6)%7;
  const start=new Date(calYear,calMonth,1);start.setDate(1-offset);
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const rows=Math.ceil((offset+daysInMonth)/7);
  for(let i=0;i<rows*7;i++){
    const cur=new Date(start);cur.setDate(start.getDate()+i);
    const iso=isoOf(cur), inMonth=cur.getMonth()===calMonth;
    const hobbies=[...new Set((byDay[iso]||[]).map(a=>a.hobby))];
    let cls='cal-cell';if(!inMonth)cls+=' mute';if(iso===todayISO())cls+=' today';if(iso===calSelected)cls+=' sel';
    const dots=hobbies.slice(0,4).map(hh=>'<span class="cal-dot" style="background:'+HOBBIES[hh].hex+'"></span>').join('');
    html+='<div class="'+cls+'" onclick="selectDay(\''+iso+'\','+cur.getFullYear()+','+cur.getMonth()+')">'
      +'<span class="dn">'+cur.getDate()+'</span><span class="cal-dots">'+dots+'</span></div>';
  }
  html+='</div></div>';

  // panel del día seleccionado
  const acts=(byDay[calSelected]||[]).sort((a,b)=>a.hobby.localeCompare(b.hobby));
  const totMin=acts.reduce((s,a)=>s+a.dur,0);
  html+='<div class="card-h" style="margin:20px 4px 10px"><span class="eyebrow">'+fmtDateLong(calSelected)+'</span>'
    +(acts.length?'<span style="font-size:11.5px;color:var(--text-faint);font-family:var(--font-mono)">'+acts.length+' · '+fmtDur(totMin)+'</span>':'')+'</div>';
  if(acts.length){
    html+='<div class="card pad0">'+acts.map(a=>activityRow(a,false)).join('')+'</div>';
  }else{
    html+='<div class="card"><div class="empty">'+svgIco('<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',34)
      +'<p><b>Sin actividades este día</b><br>Registra desde las pestañas de cada afición.</p></div></div>';
  }
  $('#v-agenda').innerHTML=html;
}
function selectDay(iso,yr,mo){calSelected=iso;if(mo!==calMonth||yr!==calYear){calMonth=mo;calYear=yr}renderAgenda()}
function shiftMonth(n){let m=calMonth+n,y=calYear;if(m<0){m=11;y--}if(m>11){m=0;y++}calMonth=m;calYear=y;renderAgenda()}
function goToday(){const d=new Date();calYear=d.getFullYear();calMonth=d.getMonth();calSelected=todayISO();renderAgenda()}

/* --- detalle de una actividad --- */
function detailRow(k,v){return '<div class="dr"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v)+'</span></div>'}
function activityDetail(src,id){
  let rec,hobby;
  if(src==='esc'){rec=DB.escritos.find(x=>x.id===id);hobby='literatura'}
  else if(src==='par'){rec=DB.parashot.find(x=>x.id===id);hobby='espiritual'}
  else if(src==='libe'){rec=DB.librosEsp.find(x=>x.id===id);hobby='espiritual'}
  else if(src==='peli'){rec=DB.peliculas.find(x=>x.id===id);hobby='cine'}
  else if(src==='serie'){rec=DB.series.find(x=>x.id===id);hobby='cine'}
  else{rec=DB.registros.find(x=>x.id===id);hobby=rec?rec.hobby:null}
  if(!rec||!hobby){toast('Registro no encontrado');return}
  const h=HOBBIES[hobby];
  let title='', fields=[], blockLabel='Descripción', blockText='', editCall='', extraHtml='';
  if(src==='esc'){
    title=rec.titulo||'(sin título)';
    fields=[['Tipo',rec.tipo],['Palabras',words(rec.contenido)],['Tiempo dedicado',rec.duracionMin?fmtDur(rec.duracionMin):'—']];
    blockLabel='Contenido'; blockText=rec.contenido||''; editCall='modalEscrito(\''+id+'\')';
  }else if(src==='par'){
    title=rec.nombre||'Parashá';
    fields=[['Traducción',rec.traduccion||'—'],['Rango',rec.rango||'—'],['Calificación',rec.calificacion?'★'.repeat(rec.calificacion):'—'],['Tiempo',rec.duracionMin?fmtDur(rec.duracionMin):'—']];
    blockLabel='Desarrollo'; blockText=rec.desarrollo||''; editCall='modalParasha(\''+id+'\')';
  }else if(src==='libe'){
    title=rec.titulo||'Libro';
    fields=[['Autor',rec.autor||'—'],['Calificación',rec.calificacion?'★'.repeat(rec.calificacion):'—'],['Tiempo',rec.duracionMin?fmtDur(rec.duracionMin):'—']];
    blockText=rec.descripcion||''; editCall='modalLibroEsp(\''+id+'\')';
  }else if(src==='peli'){
    title=rec.nombre||'Película';
    fields=[['Director',rec.director||'—'],['Año',rec.anio||'—'],['Calificación',rec.calificacion?'★'.repeat(rec.calificacion):'—']];
    blockLabel='Comentarios'; blockText=rec.comentarios||''; editCall='modalPelicula(\''+id+'\')';
  }else if(src==='serie'){
    const temps=rec.temporadas||[];
    title=rec.nombre||'Serie';
    fields=[['Temporadas',temps.length]];
    editCall='modalSerie(\''+id+'\')';
    extraHtml=temps.map(t=>'<div class="season" style="background:var(--surface)"><div class="season-h"><b>Temporada '+esc(t.num)+'</b>'
      +(t.calificacion?'<span style="color:var(--accent-cine)">'+'★'.repeat(t.calificacion)+'</span>':'')+'</div>'
      +(t.resena?'<div style="font-size:13px;color:var(--text-dim);white-space:pre-wrap;line-height:1.55">'+esc(t.resena)+'</div>':'<div style="font-size:12.5px;color:var(--text-faint)">Sin reseña</div>')+'</div>').join('');
    if(temps.length)extraHtml='<div class="eyebrow" style="margin:2px 0 8px">Temporadas</div>'+extraHtml;
  }else if(hobby==='literatura'){
    const lib=rec.meta&&libTitle(rec.meta.libroId);
    title=lib||'Sesión de lectura';
    fields=[['Páginas leídas',rec.meta&&rec.meta.paginas?rec.meta.paginas:'—'],['Tiempo',rec.duracionMin?fmtDur(rec.duracionMin):'—']];
    blockText=rec.descripcion||''; editCall='modalSesionLit(\''+id+'\')';
  }else if(hobby==='mma'){
    title=(rec.meta&&rec.meta.tipo)||'Entrenamiento';
    fields=[['Tipo',rec.meta&&rec.meta.tipo||'—'],['Intensidad',rec.meta&&rec.meta.intensidad?rec.meta.intensidad+' / 5':'—'],['Duración',rec.duracionMin?fmtDur(rec.duracionMin):'—']];
    blockText=rec.descripcion||''; editCall='modalMma(\''+id+'\')';
  }else{
    title=(rec.meta&&rec.meta.estilo)||'Práctica';
    fields=[['Estilo',rec.meta&&rec.meta.estilo||'—'],['Nivel / foco',(rec.meta&&rec.meta.nivel)||'—'],['Duración',rec.duracionMin?fmtDur(rec.duracionMin):'—']];
    blockText=rec.descripcion||''; editCall='modalBaile(\''+id+'\')';
  }
  let html='<div style="display:flex;align-items:center;gap:11px;margin-bottom:16px">'
    +'<div class="ico" style="width:40px;height:40px;border-radius:12px;background:'+h.hex+'">'+svgIco(h.icon,19)+'</div>'
    +'<div style="min-width:0;flex:1"><div style="font-weight:600;font-size:17px;font-family:var(--font-display);word-break:break-word">'+esc(title)+'</div>'
    +'<div style="font-size:12px;color:var(--text-dim);margin-top:2px"><span class="chip" style="background:'+h.hex+'22;color:'+h.hex+'">'+h.label+'</span> · '+fmtDateLong(rec.fecha)+'</div></div></div>';
  html+='<div class="card dl" style="box-shadow:none;padding:2px 15px;margin-bottom:14px">'+fields.map(f=>detailRow(f[0],f[1])).join('')+'</div>';
  if(blockText){
    html+='<div class="eyebrow" style="margin-bottom:8px">'+blockLabel+'</div><div class="detail-block">'+esc(blockText)+'</div>';
  }
  if(extraHtml)html+=extraHtml;
  html+='<button class="btn ghost" style="margin-top:10px" onclick="closeModal();'+editCall+'">Editar</button>'
    +'<button class="btn ghost" style="margin-top:8px;color:var(--accent-mma)" onclick="delActivity(\''+src+'\',\''+id+'\',true)">Eliminar</button>';
  openModal(html);
}

function modalFuente(){
  let html='<h3>Tipo de letra</h3><p class="msub">Cambia la tipografía de toda la app.</p>';
  html+=FUENTES.map(f=>'<button class="font-opt'+(DB.ui.fuente===f.id?' on':'')+'" onclick="pickFont(\''+f.id+'\')">'
    +'<span class="fprev" style="font-family:var(--font-display)">'+f.muestra+'</span>'
    +'<span class="fname">'+f.nombre+'</span>'
    +(DB.ui.fuente===f.id?svgIco('<path d="M20 6 9 17l-5-5"/>',20):'')+'</button>').join('');
  html+='<button class="btn ghost" style="margin-top:6px" onclick="openSettings()">Volver</button>';
  openModal(html);
  // muestra cada opción con su propia fuente
  document.querySelectorAll('.font-opt').forEach((el,i)=>{el.querySelector('.fprev').style.fontFamily=fontStack(FUENTES[i].id)});
}
function fontStack(id){const map={
  clasica:'"Iowan Old Style",Palatino,Georgia,serif',moderna:'system-ui,"Segoe UI",Roboto,sans-serif',
  editorial:'Georgia,"Times New Roman",serif',redondeada:'"Trebuchet MS","Segoe UI",Verdana,sans-serif',

/* --- Dashboard mensual (resumen + exportación) --- */
function mesActualISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function nombreMes(mes){const p=mes.split('-');return MESES[+p[1]-1]+' '+p[0]}
function modalDashboard(mes){
  mes=mes||mesActualISO();
  const acts=allActivities().filter(a=>a.fecha&&a.fecha.slice(0,7)===mes);
  const totMin=acts.reduce((s,a)=>s+a.dur,0);
  const per={};Object.keys(HOBBIES).forEach(k=>per[k]={min:0,n:0});
  acts.forEach(a=>{if(per[a.hobby]){per[a.hobby].min+=a.dur;per[a.hobby].n++}});
  let rows=Object.keys(HOBBIES).map(k=>{
    const p=per[k],h=HOBBIES[k];if(p.n===0)return '';
    const pct=totMin?Math.round(p.min/totMin*100):0;
    return '<div class="goal"><div class="goal-top"><span class="dot" style="background:'+h.hex+'"></span><span>'+h.label+'</span>'
      +'<span class="gv">'+p.n+' · '+fmtDur(p.min)+'</span></div>'
      +'<div class="progress"><i style="width:'+Math.max(3,pct)+'%;background:'+h.hex+'"></i></div></div>';
  }).join('');
  openModal('<h3>Dashboard</h3><p class="msub">Resumen de un mes y exportación de resultados.</p>'
    +'<div class="field"><label>Mes</label><input id="dm_mes" type="month" value="'+mes+'" onchange="modalDashboard(this.value)" style="--fc:var(--accent-esc)"></div>'
    +'<div class="kpis"><div class="kpi"><div class="n">'+acts.length+'</div><div class="k">Registros</div></div>'
    +'<div class="kpi"><div class="n">'+fmtDur(totMin)+'</div><div class="k">Tiempo del mes</div></div></div>'
    +(acts.length?('<div class="card" style="box-shadow:none"><div class="card-h"><span class="lbl">'+esc(nombreMes(mes))+'</span></div>'+rows+'</div>'
      +'<button class="btn" onclick="exportMesCSV(\''+mes+'\')">'+svgIco('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>',17)+' Exportar CSV del mes</button>')
      :'<div class="empty" style="padding:24px"><p>Sin registros en '+esc(nombreMes(mes))+'.</p></div>'));
}
function exportMesCSV(mes){
  const acts=allActivities().filter(a=>a.fecha&&a.fecha.slice(0,7)===mes);
  const rows=[['Fecha','Aficion','Categoria','Descripcion','Duracion (min)']];
  acts.forEach(a=>rows.push([a.fecha,HOBBIES[a.hobby]?HOBBIES[a.hobby].label:a.hobby,a.cat||'',(a.desc||'').replace(/\s+/g,' '),a.dur||0]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  download('bitacora_dashboard_'+mes+'.csv','\ufeff'+csv,'text/csv');
  toast('CSV de '+nombreMes(mes)+' exportado');
}

    +'<div class="rowline"><span class="lx">Recordarme preparar la parashá<small>Aviso semanal si aún no la registras</small></span>'
    +'<label class="switch"><input type="checkbox" id="pr_activo"'+(pr.activo?' checked':'')+'><span class="sl" style="--accent-esc:var(--accent-esp)"></span></label></div>'
    +'<div class="field"><label>Día del recordatorio</label><div class="filters" id="parDayChips">'+parChips+'</div></div>'
    +'<hr style="border:none;border-top:1px solid var(--border);margin:0 0 16px">'
    +'<div class="eyebrow" style="margin-bottom:14px">Recordatorios generales</div>'
    +'<div class="rowline"><span class="lx">Mostrar avisos de metas al abrir la app</span>'
    +'<label class="switch"><input type="checkbox" id="r_activo"'+(r.activo?' checked':'')+'><span class="sl"></span></label></div>'
    +'<div class="field"><label>Días de recordatorio</label><div class="filters" id="dayChips">'+dayChips+'</div></div>'
    +'<div class="field"><label>Hora sugerida</label><input id="r_hora" type="time" value="'+esc(r.hora)+'" style="--fc:var(--accent-esc)"></div>'
    +'<div class="rowline"><span class="lx">Notificación del teléfono<small>Requiere la app abierta o añadida a la pantalla de inicio</small></span>'
    +'<label class="switch"><input type="checkbox" id="r_notif"'+(r.notificar?' checked':'')+'><span class="sl"></span></label></div>'
    +'<button class="btn" style="margin-top:14px" onclick="saveMetas()">Guardar</button>');
}
function toggleDay(el){el.classList.toggle('on');el.style.background=el.classList.contains('on')?'var(--accent-esc)':''}
function pickParashaDay(el){document.querySelectorAll('#parDayChips .tag').forEach(c=>{c.classList.remove('on');c.style.background=''});el.classList.add('on');el.style.background='var(--accent-esp)'}
function saveMetas(){
  Object.keys(HOBBIES).forEach(k=>{DB.metas[k]={tipo:$('#mt_'+k).value,valor:Math.max(0,+$('#mv_'+k).value||0)}});
  const dias=[...document.querySelectorAll('#dayChips .tag.on')].map(e=>+e.dataset.day);
  const parSel=document.querySelector('#parDayChips .tag.on');
  const parasha={activo:$('#pr_activo').checked,dia:parSel?+parSel.dataset.pday:4};
  DB.recordatorios={activo:$('#r_activo').checked,dias:dias,hora:$('#r_hora').value||'19:00',notificar:$('#r_notif').checked,parasha:parasha};
  saveDB();nudgeDismissed=false;
  syncReminderToSW();
  if(DB.recordatorios.notificar&&typeof Notification!=='undefined'&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p!=='granted')toast('Notificaciones no permitidas');scheduleNotif()});
  }else scheduleNotif();
  closeModal();renderCurrent();toast('Metas guardadas');
}

/* --- borrar actividad genérica --- */
function delActivity(src,id,fromModal){
  if(src==='esc')DB.escritos=DB.escritos.filter(x=>x.id!==id);
  else if(src==='par')DB.parashot=DB.parashot.filter(x=>x.id!==id);
  else if(src==='libe')DB.librosEsp=DB.librosEsp.filter(x=>x.id!==id);
  else if(src==='peli')DB.peliculas=DB.peliculas.filter(x=>x.id!==id);
  else if(src==='serie')DB.series=DB.series.filter(x=>x.id!==id);
  else DB.registros=DB.registros.filter(x=>x.id!==id);
  saveDB();if(fromModal)closeModal();
  renderCurrent();
  toast('Registro eliminado');
}

/* ============================================================
   RESPALDO (exportar / importar)
   ============================================================ */
function openBackup(){
  const s=computeStats();
  openModal('<h3>Respaldo y datos</h3><p class="msub">Guarda una copia o restaura tu información en otro dispositivo.</p>'
    +'<div class="card" style="box-shadow:none;background:var(--surface-2);margin-bottom:14px"><div class="t3" style="font-family:var(--font-mono);color:var(--text-dim);display:flex;gap:16px;flex-wrap:wrap;font-size:12px">'
    +'<span>'+DB.libros.length+' libros</span><span>'+DB.escritos.length+' escritos</span><span>'+DB.registros.length+' registros</span><span>'+(DB.peliculas.length+DB.series.length)+' cine</span><span>'+(DB.parashot.length+DB.librosEsp.length)+' espiritual</span></div></div>'
    +'<button class="btn" onclick="exportBackup()">'+svgIco('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>',17)+' Descargar respaldo (.json)</button>'
    +'<label class="btn ghost" style="margin-top:10px">'+svgIco('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/>',17)+' Importar respaldo<input type="file" accept=".json,application/json" style="display:none" onchange="importBackup(event)"></label>'
    +'<p style="font-size:11.5px;color:var(--text-faint);margin-top:14px;line-height:1.5">Importar <b>reemplaza</b> todos los datos actuales por los del archivo. Haz un respaldo antes si tienes dudas.</p>'
    +'<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">'
    +'<button class="btn ghost" style="color:var(--accent-mma)" onclick="wipeData()">Borrar todos los datos</button>');
}
function exportBackup(){
  const payload={app:'Bitacora',version:4,exportado:new Date().toISOString(),data:{ui:DB.ui,libros:DB.libros,escritos:DB.escritos,registros:DB.registros,parashot:DB.parashot,librosEsp:DB.librosEsp,peliculas:DB.peliculas,series:DB.series,metas:DB.metas,recordatorios:DB.recordatorios,config:DB.config}};
  download('bitacora_respaldo_'+todayISO()+'.json',JSON.stringify(payload,null,2),'application/json');
  toast('Respaldo descargado');
}
function importBackup(ev){
  const file=ev.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const p=JSON.parse(rd.result);
      const d=p.data||p;
      if(!d||(!Array.isArray(d.registros)&&!Array.isArray(d.libros)&&!Array.isArray(d.escritos)))throw new Error('formato');
      DB.libros=Array.isArray(d.libros)?d.libros:[];
      DB.escritos=Array.isArray(d.escritos)?d.escritos:[];
      DB.registros=Array.isArray(d.registros)?d.registros:[];
      DB.parashot=Array.isArray(d.parashot)?d.parashot:[];
      DB.librosEsp=Array.isArray(d.librosEsp)?d.librosEsp:[];
      DB.peliculas=Array.isArray(d.peliculas)?d.peliculas:[];
      DB.series=Array.isArray(d.series)?d.series:[];
      if(d.metas)DB.metas=d.metas;
      if(d.recordatorios)DB.recordatorios=d.recordatorios;
      if(d.config)DB.config=d.config;
      if(d.ui&&d.ui.tema)DB.ui.tema=d.ui.tema;
      if(d.ui&&d.ui.fuente)DB.ui.fuente=d.ui.fuente;
      ensureSchema();saveDB();closeModal();applyTheme(DB.ui.tema||'claro',true);applyFont(DB.ui.fuente||'clasica',true);scheduleNotif();syncReminderToSW();go('panel');
      toast('Respaldo importado');
    }catch(e){toast('Archivo no válido')}
  };
  rd.readAsText(file);ev.target.value='';
}
function wipeData(){
  openModal('<h3>Borrar todos los datos</h3><p class="msub">Esta acción no se puede deshacer. Se eliminarán libros, escritos y registros de este dispositivo.</p>'
    +'<button class="btn" style="background:var(--accent-mma)" onclick="confirmWipe()">Sí, borrar todo</button>'
    +'<button class="btn ghost" style="margin-top:10px" onclick="closeModal()">Cancelar</button>');
}
function confirmWipe(){
  DB.libros=[];DB.escritos=[];DB.registros=[];DB.parashot=[];DB.librosEsp=[];DB.peliculas=[];DB.series=[];saveDB();closeModal();go('panel');toast('Datos borrados');
}
function download(name,content,type){
  const blob=new Blob([content],{type:type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},100);
}

/* ============================================================
   ARRANQUE
   ============================================================ */
const shakeStyle=document.createElement('style');
shakeStyle.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}';
document.head.appendChild(shakeStyle);

DB=loadDB();
ensureSchema();
initLock();

/* Enter para setup / pin en teclado físico */
document.addEventListener('keydown',e=>{
  if($('#lock').style.display==='none')return;
  if($('#setupWrap').style.display!=='none'){if(e.key==='Enter')doSetup();return}
  if(/^\d$/.test(e.key))pressPin(e.key);
  else if(e.key==='Backspace'){pinBuf=pinBuf.slice(0,-1);renderPinDots()}
});

/* ============================================================
   PWA: service worker, instalación y recordatorio en segundo plano
   ============================================================ */
function registerSW(){
  if(!('serviceWorker' in navigator)||location.protocol==='file:')return;
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e});
window.addEventListener('appinstalled',()=>{deferredInstall=null;toast('App instalada')});
function doInstall(){
  if(!deferredInstall){toast('Usa el menú del navegador → "Instalar app"');return}
  deferredInstall.prompt();
  deferredInstall.userChoice.finally(()=>{deferredInstall=null;closeModal()});
}
async function syncReminderToSW(){
  const pr=DB.recordatorios.parasha||{activo:false,dia:4};
  const dias=(DB.recordatorios.activo?(DB.recordatorios.dias||[]):[]).slice();
  if(pr.activo&&!dias.includes(pr.dia))dias.push(pr.dia);
  const anyOn=(DB.recordatorios.activo||pr.activo);
  try{
    if('caches' in window){
      const cache=await caches.open('bitacora-cfg');
      await cache.put('reminder-cfg',new Response(JSON.stringify({
        activo:anyOn,dias:dias,hora:DB.recordatorios.hora,notificar:DB.recordatorios.notificar,parashaDia:pr.activo?pr.dia:null
      }),{headers:{'Content-Type':'application/json'}}));
    }
  }catch(e){}
  try{
    const reg=navigator.serviceWorker&&await navigator.serviceWorker.ready;
    if(reg&&'periodicSync' in reg&&anyOn&&DB.recordatorios.notificar){
      const st=await navigator.permissions.query({name:'periodic-background-sync'}).catch(()=>null);
      if(!st||st.state==='granted')await reg.periodicSync.register('bitacora-reminder',{minInterval:12*3600*1000}).catch(()=>{});
    }
  }catch(e){}
}
registerSW();
</script>
